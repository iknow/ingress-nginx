name: Chart

on:
  schedule:
    - cron: '0 0 * * 1' # every Monday at 00:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: 3.x

      - name: Set up Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1
        with:
          version: v4.1.3

      - name: Set up Helm Chart Testing
        uses: helm/chart-testing-action@6ec842c01de15ebb84c8627d2744a0c2f2755c9f

      - name: Set up Git
        run: |
          git config --global user.name "${GITHUB_ACTOR}"
          git config --global user.email "${GITHUB_ACTOR}@users.noreply.github.com"

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Check if Chart.yaml version warrants a release
        id: check
        run: |
          git fetch --tags
          CHART_VERSION=$(grep '^version:' charts/ingress-nginx/Chart.yaml | awk '{print $2}')
          LAST_TAG=$(git tag --list 'helm-chart-*' --sort=-v:refname | head -1)
          LAST_VERSION="${LAST_TAG#helm-chart-}"

          echo "Chart.yaml version: $CHART_VERSION"
          echo "Last released version: ${LAST_VERSION:-none}"

          if [ "$CHART_VERSION" != "$LAST_VERSION" ]; then
            echo "Chart version differs from last release. Proceeding."
            echo "need_release=yes" >> "$GITHUB_OUTPUT"
          else
            echo "Chart version unchanged since last release. Skipping."
            echo "need_release=no" >> "$GITHUB_OUTPUT"
          fi

      - name: Lint chart
        if: steps.check.outputs.need_release == 'yes'
        run: ct lint --config .ct.yaml

      - name: Release chart
        if: steps.check.outputs.need_release == 'yes'
        uses: helm/chart-releaser-action@cae68fefc6b5f367a0275617c9f83181ba54714f # v1.7.0
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CR_RELEASE_NAME_TEMPLATE: helm-chart-{{ .Version }}
          CR_SKIP_EXISTING: true
        with:
          charts_dir: charts
