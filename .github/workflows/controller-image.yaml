name: Controller Image

on:
  push:
    branches:
      - main
    tags:
      - 'controller-v*'
    paths-ignore:
      - 'docs/**'
      - 'deploy/**'
      - '**.md'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/ingress-nginx/controller

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Get go version
        run: echo "GOLANG_VERSION=$(cat GOLANG_VERSION)" >> $GITHUB_ENV

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: ${{ env.GOLANG_VERSION }}
          check-latest: true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
        with:
          version: latest

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine image tag
        id: tag
        run: |
          if [[ "$GITHUB_REF" == refs/tags/controller-v* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=$(cat TAG)" >> "$GITHUB_OUTPUT"
          fi

      - name: Build binaries (multi-arch)
        run: |
          for ARCH in amd64 arm arm64; do
            ARCH=$ARCH make build
          done

      - name: Build and push controller image
        env:
          TAG: ${{ steps.tag.outputs.tag }}
          REGISTRY: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        run: |
          BASE_IMAGE=$(cat NGINX_BASE)
          docker buildx build \
            --no-cache \
            --push \
            --platform linux/amd64,linux/arm,linux/arm64 \
            --build-arg BASE_IMAGE="${BASE_IMAGE}" \
            --build-arg VERSION="${TAG}" \
            --build-arg COMMIT_SHA="${GITHUB_SHA}" \
            -t "${REGISTRY}:${TAG}" \
            rootfs

      - name: Build and push controller-chroot image
        env:
          TAG: ${{ steps.tag.outputs.tag }}
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAME: ${{ github.repository_owner }}/ingress-nginx/controller-chroot
        run: |
          BASE_IMAGE=$(cat NGINX_BASE)
          docker buildx build \
            --no-cache \
            --push \
            --platform linux/amd64,linux/arm,linux/arm64 \
            --build-arg BASE_IMAGE="${BASE_IMAGE}" \
            --build-arg VERSION="${TAG}" \
            --build-arg COMMIT_SHA="${GITHUB_SHA}" \
            -t "${REGISTRY}/${IMAGE_NAME}:${TAG}" \
            rootfs -f rootfs/Dockerfile-chroot
